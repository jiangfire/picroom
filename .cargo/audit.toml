# cargo-audit configuration.
# https://github.com/rustsec/rustsec/tree/main/cargo-audit
#
# NOTE: cargo-audit reads this file from `.cargo/audit.toml` (project root
# `.cargo/` subdir) or `~/.cargo/audit.toml`. A bare `audit.toml` in the
# project root is NOT read. The `[[advisories.ignore]]` table form with
# `id`+`reason` is cargo-deny syntax; cargo-audit uses `ignore = [...]`.
#
# Waivers below cover advisories that affect ONLY development/edge
# dependencies and for which NO fixed upstream release exists within our
# pinned dependency ranges (verified 2026-07-10).
#
# Proof these are NOT in the shipped `picroom` release binary:
#   cargo tree --edges normal -i tokio-tar   # -> "nothing to print"
#   cargo tree --edges normal -i rsa         # -> "nothing to print"
#
# Review every quarter; drop an entry the moment an upstream fix lands or we
# replace the pulling crate.

[advisories]
ignore = [
    # rsa — Marvin-style timing attack on PKCS#1 v1.5 decryption.
    # No fixed upgrade available within the 0.9.x line. Transitive (S3/SigV4
    # path), not reachable in the default deployment. Not in the release binary.
    "RUSTSEC-2023-0071",
    # tokio-tar — PAX extended header smuggling.
    # No fixed upgrade available. Pulled only by the testcontainers integration
    # harness; not in the release binary.
    "RUSTSEC-2025-0111",
    # paste — unmaintained. Build-time macro helper, no security impact;
    # kept only as a belt-and-suspenders waiver.
    "RUSTSEC-2024-0436",
    # rustls-pemfile — unmaintained. Functional; pinned and monitored.
    "RUSTSEC-2025-0134",
]
