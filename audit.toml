# cargo-audit configuration.
# https://github.com/rustsec/rustsec/tree/main/cargo-audit

[advisories]
# Waivers below cover advisories that affect ONLY development dependencies
# pulled in transitively by `testcontainers` (integration-test harness).
#
# Proof they are NOT in the shipped `picroom` release binary:
#   cargo tree --edges normal -i tokio-tar   # → "nothing to print"
#   cargo tree --edges normal -i rsa         # → "nothing to print"
#
# No fixed upstream version exists within our pinned `testcontainers` range
# as of 2026-07-08. Review every quarter; drop an entry the moment
# testcontainers publishes a fix or we replace the harness.
ignore = [
    # rsa — Marvin-style timing attack on PKCS#1 v1.5 decryption.
    # Unfixed upstream; dev-only via testcontainers. Not in release binary.
    "RUSTSEC-2023-0071",
    # tokio-tar — testcontainers transitive dep. Dev-only. Not in release binary.
    "RUSTSEC-2025-0111",
]
