# cargo-audit configuration.
# https://github.com/rustsec/rustsec/tree/main/cargo-audit
#
# Waivers below cover advisories that affect ONLY development/edge
# dependencies and for which NO fixed upstream release exists within our
# pinned dependency ranges (verified 2026-07-10).
#
# Proof these are NOT in the shipped `picroom` release binary:
#   cargo tree --edges normal -i tokio-tar   # -> "nothing to print"
#   cargo tree --edges normal -i rsa         # -> "nothing to print"
#
# Review every quarter; drop an entry the moment an upstream fix lands or we
# replace the pulling crate. The `[[advisories.ignore]]` table form (with a
# `reason`) is required by current cargo-audit; the legacy `ignore = [...]`
# short-form is no longer honoured and was silently ignored.

[advisories]
# rsa — Marvin-style timing attack on PKCS#1 v1.5 decryption (RUSTSEC-2023-0071).
# No fixed upgrade available within the 0.9.x line. Transitive (S3/SigV4 path),
# not reachable in the default deployment. Not in the release binary.
[[advisories.ignore]]
id = "RUSTSEC-2023-0071"
reason = "No upstream fix available; transitive dev/edge dependency, absent from the release binary."

# tokio-tar — PAX extended header smuggling (RUSTSEC-2025-0111).
# No fixed upgrade available. Pulled only by the testcontainers integration
# harness; not in the release binary.
[[advisories.ignore]]
id = "RUSTSEC-2025-0111"
reason = "No fixed upgrade available; dev-only via testcontainers, absent from the release binary."

# paste — unmaintained (RUSTSEC-2024-0436). Build-time macro helper, no
# security impact; kept only as a belt-and-suspenders waiver.
[[advisories.ignore]]
id = "RUSTSEC-2024-0436"
reason = "Unmaintained but functional build-dependency; no security impact."

# rustls-pemfile — unmaintained (RUSTSEC-2025-0134). Functional; pinned and
# monitored. Belt-and-suspenders waiver.
[[advisories.ignore]]
id = "RUSTSEC-2025-0134"
reason = "Unmaintained but functional; pinned and monitored."
