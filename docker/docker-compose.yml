# docker-compose.yml — full local stack for development & demo
#
# Bring up:  docker compose -f docker/docker-compose.yml up -d
# Bring down: docker compose -f docker/docker-compose.yml down
# Reset data: docker compose -f docker/docker-compose.yml down -v

name: picroom

services:
  # ----------------------------------------------------------------------
  # PostgreSQL 16
  # ----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: picroom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: picroom
      POSTGRES_PASSWORD: picroom_dev_secret
      POSTGRES_DB: picroom
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U picroom -d picroom"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - picroom-net

  # ----------------------------------------------------------------------
  # MinIO (S3-compatible object storage for dev)
  # ----------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: picroom-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: picroom_dev
      MINIO_ROOT_PASSWORD: picroom_dev_secret
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - picroom-net

  # ----------------------------------------------------------------------
  # MailHog (dev SMTP catch-all)
  # ----------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: picroom-mailhog
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # Web UI
    networks:
      - picroom-net

  # ----------------------------------------------------------------------
  # Picroom API
  # ----------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: picroom:dev
    container_name: picroom-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PICROOM_SERVER__BIND_ADDR: "0.0.0.0:8080"
      PICROOM_DATABASE__URL: "postgres://picroom:picroom_dev_secret@postgres/picroom"
      PICROOM_DATABASE__MAX_CONNECTIONS: "20"
      PICROOM_STORAGE__DEFAULT: "minio"
      PICROOM_STORAGE__POLICIES__MINIO__DRIVER: "minio"
      PICROOM_STORAGE__POLICIES__MINIO__ENDPOINT: "http://minio:9000"
      PICROOM_STORAGE__POLICIES__MINIO__REGION: "us-east-1"
      PICROOM_STORAGE__POLICIES__MINIO__BUCKET: "picroom"
      PICROOM_STORAGE__POLICIES__MINIO__ACCESS_KEY_ID: "picroom_dev"
      PICROOM_STORAGE__POLICIES__MINIO__SECRET_ACCESS_KEY: "picroom_dev_secret"
      PICROOM_AUTH__ALLOW_SIGNUP: "true"
      PICROOM_AUTH__JWT__SECRET: "dev-secret-do-not-use-in-prod"
      PICROOM_LOGGING__LEVEL: "info"
      PICROOM_LOGGING__FORMAT: "json"
      RUST_LOG: "info,picroom=debug,sqlx=warn"
    volumes:
      - ./config.example.toml:/etc/picroom/config.toml:ro
    ports:
      - "8080:8080"
    command: ["api", "--config", "/etc/picroom/config.toml"]
    networks:
      - picroom-net

  # ----------------------------------------------------------------------
  # Picroom worker (async image processing)
  # ----------------------------------------------------------------------
  worker:
    image: picroom:dev
    container_name: picroom-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PICROOM_DATABASE__URL: "postgres://picroom:picroom_dev_secret@postgres/picroom"
      PICROOM_STORAGE__DEFAULT: "minio"
      PICROOM_STORAGE__POLICIES__MINIO__DRIVER: "minio"
      PICROOM_STORAGE__POLICIES__MINIO__ENDPOINT: "http://minio:9000"
      PICROOM_STORAGE__POLICIES__MINIO__REGION: "us-east-1"
      PICROOM_STORAGE__POLICIES__MINIO__BUCKET: "picroom"
      PICROOM_STORAGE__POLICIES__MINIO__ACCESS_KEY_ID: "picroom_dev"
      PICROOM_STORAGE__POLICIES__MINIO__SECRET_ACCESS_KEY: "picroom_dev_secret"
      PICROOM_PIPELINE__ENCODE_AVIF: "true"
      PICROOM_PIPELINE__ENCODE_WEBP: "true"
      PICROOM_PIPELINE__GENERATE_THUMBNAIL: "true"
      PICROOM_LOGGING__LEVEL: "info"
      PICROOM_LOGGING__FORMAT: "json"
      RUST_LOG: "info,picroom=debug"
    volumes:
      - ./config.example.toml:/etc/picroom/config.toml:ro
    command: ["worker", "--config", "/etc/picroom/config.toml"]
    networks:
      - picroom-net

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  picroom-net:
    driver: bridge