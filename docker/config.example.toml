# Picroom example configuration
# Copy to config/dev.toml and adjust for your environment.
# All settings can be overridden by environment variables prefixed with
# PICROOM_ (e.g. PICROOM_SERVER__BIND_ADDR=0.0.0.0:9090). Nested keys use a
# double underscore: PICROOM_DATABASE__MAX_CONNECTIONS=20.
#
# SECRETS (JWT secret, S3 SigV4 credentials) are intentionally NOT stored here.
# Set them via environment variables instead:
#   PICROOM_AUTH__JWT_SECRET, PICROOM_S3_ACCESS_KEY_ID, PICROOM_S3_SECRET_ACCESS_KEY
# This file is committed and must stay secret-free.

[server]
bind_addr = "0.0.0.0:8080"
request_timeout_secs = 30
graceful_shutdown_secs = 30
max_body_mb = 100

[database]
url = "postgres://picroom:picroom_dev_secret@localhost:5432/picroom"
max_connections = 20
min_connections = 2

[storage]
# Name of the default storage policy. The actual driver (local / S3 / MinIO) is
# selected by the PICROOM_STORAGE__POLICIES__* environment variables — see
# docs/deployment.md. This file only names the default policy.
default = "minio"

[pipeline]
encode_avif = true
encode_webp = true
generate_thumbnail = true
strip_exif = true
max_dimension = 8192

[auth]
allow_signup = false
password_min_length = 12
# jwt_secret / jwt_issuer / jwt_audience / jwt_ttl_secs are configured via the
# PICROOM_AUTH__JWT_SECRET (etc.) environment variables. Never put a real secret
# in a committed file — release builds refuse to start on the default "change-me".

[quota]
default_user_bytes = 10737418240       # 10 GiB per user
default_team_bytes = 1099511627776     # 1 TiB per team
soft_limit_warning = 0.9              # warn at 90% used
hard_limit_enforce = true

[rate_limit]
per_user_rps = 10
per_user_burst = 20
per_ip_rps = 50
per_ip_burst = 100

[audit]
retention_days = 365

[logging]
level = "info"
format = "json"   # "json" or "pretty"

[telemetry]
metrics_enabled = true
otlp_endpoint = ""   # e.g. "http://localhost:4317" to enable OTLP tracing
