name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 3

jobs:
  # ---------------------------------------------------------------------
  # 1. Format check (fastest gate)
  # ---------------------------------------------------------------------
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------
  # 2. Clippy (must pass with -D warnings)
  # ---------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  # ---------------------------------------------------------------------
  # 3. Unit + integration tests
  # ---------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: clippy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: picroom
          POSTGRES_PASSWORD: picroom_test
          POSTGRES_DB: picroom_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U picroom -d picroom_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo test --workspace --locked --all-features
        env:
          DATABASE_URL: postgres://picroom:picroom_test@localhost:5432/picroom_test
      - run: cargo test --workspace --locked --all-features --doc
        env:
          DATABASE_URL: postgres://picroom:picroom_test@localhost:5432/picroom_test
      - name: Check minimal dependency set
        run: cargo hack check --workspace --feature-powerset

  # ---------------------------------------------------------------------
  # 4. Doctests
  # ---------------------------------------------------------------------
  doctest:
    name: doctest
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --doc

  # ---------------------------------------------------------------------
  # 5. Coverage (informational; gate enforced separately)
  # ---------------------------------------------------------------------
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Run coverage
        run: cargo tarpaulin --workspace --out Xml --output-dir target/coverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/coverage/cobertura.xml
          fail_ci_if_error: false
          verbose: true

  # ---------------------------------------------------------------------
  # 6. Security audit (RUSTSEC)
  # ---------------------------------------------------------------------
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit

  # ---------------------------------------------------------------------
  # 7. License / dependency policy (cargo-deny)
  # ---------------------------------------------------------------------
  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - run: cargo deny check

  # ---------------------------------------------------------------------
  # 8. OpenAPI lint
  # ---------------------------------------------------------------------
  openapi:
    name: openapi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate OpenAPI 3.1
        uses: char0n/redocly-cli-action@v1
        with:
          version: latest
          lint: docs/api/openapi.yaml

  # ---------------------------------------------------------------------
  # 9. Docker compose smoke
  # ---------------------------------------------------------------------
  compose-smoke:
    name: compose-smoke
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose -f docker/docker-compose.yml config --quiet

  # ---------------------------------------------------------------------
  # Required gates — block merge if any fail
  # ---------------------------------------------------------------------
  required:
    name: required
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy
      - test
      - doctest
      - audit
      - deny
      - openapi
      - compose-smoke
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required checks failed"
            exit 1
          fi
          echo "All required checks passed"