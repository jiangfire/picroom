name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 3

jobs:
  # ---------------------------------------------------------------------
  # 1. Format check (fastest gate)
  # ---------------------------------------------------------------------
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------
  # 2. Clippy (must pass with -D warnings)
  # ---------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  # ---------------------------------------------------------------------
  # 3. Unit + integration tests (matrix across OSes)
  # ---------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: clippy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: picroom
          POSTGRES_PASSWORD: picroom_test
          POSTGRES_DB: picroom_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U picroom -d picroom_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo test --workspace --locked --all-features
        env:
          DATABASE_URL: postgres://picroom:picroom_test@localhost:5432/picroom_test
      - run: cargo test --workspace --locked --all-features --doc
        env:
          DATABASE_URL: postgres://picroom:picroom_test@localhost:5432/picroom_test
      - name: Check minimal dependency set
        run: cargo hack check --workspace

  # ---------------------------------------------------------------------
  # 4. Doctests
  # ---------------------------------------------------------------------
  doctest:
    name: doctest
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --doc

  # ---------------------------------------------------------------------
  # 5. Coverage (informational; not part of the required gate)
  # ---------------------------------------------------------------------
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Run coverage
        run: cargo tarpaulin --workspace --out Xml --output-dir target/coverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/coverage/cobertura.xml
          fail_ci_if_error: false
          verbose: true

  # ---------------------------------------------------------------------
  # 6. Security audit (RUSTSEC)
  # ---------------------------------------------------------------------
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2025-0111

  # ---------------------------------------------------------------------
  # 7. License / dependency policy (cargo-deny)
  # ---------------------------------------------------------------------
  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - run: cargo deny check

  # ---------------------------------------------------------------------
  # 8. PostgreSQL E2E: migrate -> build -> start API -> upload
  # ---------------------------------------------------------------------
  postgres-integration:
    name: PostgreSQL E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: picroom
          POSTGRES_PASSWORD: picroom_test
          POSTGRES_DB: picroom_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U picroom -d picroom_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://picroom:picroom_test@localhost:5432/picroom_test
      PICROOM_DATABASE__URL: postgres://picroom:picroom_test@localhost:5432/picroom_test
      # Required so the release binary doesn't panic on the default "change-me".
      PICROOM_AUTH__JWT_SECRET: ci-test-secret-do-not-use-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features rustls,postgres || true
      - name: Create database
        run: sqlx database create || true
      - name: Run migrations (PG)
        run: sqlx migrate run --source migrations
      - name: Seed dev user for E2E
        # The upload handler stores images with owner_id = dev_user (nil UUID)
        # and writes audit events with actor_id = nil UUID. Both columns FK to
        # users(id), so we must seed that row or the upload hits a FK violation.
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql "$DATABASE_URL" -c "INSERT INTO users (id, email, name, password_hash, role) VALUES ('00000000-0000-0000-0000-000000000000', 'dev@example.com', 'Dev User', 'ci-not-a-real-hash', 'admin') ON CONFLICT (id) DO NOTHING;"
      - name: Build release binary
        run: cargo build --release --bin picroom
      - name: Start API server
        run: |
          ./target/release/picroom api &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          sleep 3
          # Health check
          curl -sf http://localhost:8080/healthz | grep -q '"ok"'
          echo "API healthy"
      - name: Test upload + variant generation
        run: |
          # Generate a small PNG
          python3 -c "
          import struct, zlib
          w, h = 10, 10
          raw = b''
          for y in range(h):
              raw += b'\\x00' + bytes([x % 256 for x in range(w * 3)])
          def chunk(typ, data):
              c = typ + data
              return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
          sig = b'\\x89PNG\\r\\n\\x1a\\n'
          ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
          idat = zlib.compress(raw)
          png = sig + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
          with open('/tmp/test.png', 'wb') as f:
              f.write(png)
          "

          # Log in (stub auth: any credentials return a JWT)
          TOKEN=$(curl -sf -X POST \
            -H 'content-type: application/json' \
            -d '{"email":"ci@example.com","password":"ci"}' \
            http://localhost:8080/api/v1/auth/login | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "Got token: ${TOKEN:0:12}..."

          # Upload (Bearer auth required on /api/v1/images)
          RESP=$(curl -sf -X POST \
            -H "authorization: Bearer $TOKEN" \
            -F "file=@/tmp/test.png;type=image/png" \
            http://localhost:8080/api/v1/images)
          echo "Upload response: $RESP"
          IMAGE_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Image ID: $IMAGE_ID"
      - name: Kill API
        if: always()
        run: kill $API_PID 2>/dev/null || true

  # ---------------------------------------------------------------------
  # 9. Docker image build + healthz probe
  # ---------------------------------------------------------------------
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    env:
      # Required so the release binary doesn't panic on the default "change-me".
      PICROOM_AUTH__JWT_SECRET: ci-test-secret-do-not-use-in-production
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: picroom:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify binary exists in image
        run: |
          docker run --rm picroom:ci-test --version
      - name: Test healthz
        run: |
          # healthz is a pure liveness probe and never touches the DB, so the
          # container needs no Postgres. We pass an empty PICROOM_DATABASE__URL
          # so the app runs with no DB dependency at all (it degrades
          # gracefully if a DB is configured but unreachable). GitHub-hosted
          # runners restrict `--network host`, so we publish 8080 and probe it
          # from the runner over 127.0.0.1. We deliberately omit `--rm` so the
          # logs survive a crash for diagnosis.
          docker run -d \
            -p 8080:8080 \
            --name picroom-test \
            -e PICROOM_AUTH__JWT_SECRET \
            -e PICROOM_DATABASE__URL= \
            picroom:ci-test api
          trap 'docker stop picroom-test >/dev/null 2>&1 || true' EXIT
          for i in $(seq 1 45); do
            if curl -sf --max-time 2 http://127.0.0.1:8080/healthz | grep -q '"ok"'; then
              echo "Docker image healthy"
              docker stop picroom-test >/dev/null 2>&1 || true
              exit 0
            fi
            sleep 2
          done
          echo "=== healthz never returned ok ==="
          docker logs picroom-test || true
          docker stop picroom-test >/dev/null 2>&1 || true
          exit 1

  # ---------------------------------------------------------------------
  # 10. docker-compose smoke test
  # ---------------------------------------------------------------------
  compose-smoke:
    name: Docker Compose Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose -f docker/docker-compose.yml config --quiet
      - name: Start stack
        run: docker compose -f docker/docker-compose.yml up -d postgres minio
      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker/docker-compose.yml exec -T postgres pg_isready -U picroom; then
              echo "Postgres ready"
              exit 0
            fi
            sleep 2
          done
          echo "Postgres not ready"
          exit 1
      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO ready"
              exit 0
            fi
            sleep 2
          done
          echo "MinIO not ready"
          exit 1
      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  # ---------------------------------------------------------------------
  # Required gates — block merge if any fail
  # ---------------------------------------------------------------------
  required:
    name: required
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy
      - test
      - doctest
      - audit
      - deny
      - postgres-integration
      - docker-build
      - compose-smoke
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required checks failed"
            exit 1
          fi
          echo "All required checks passed"
