name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------
  # Build and push Docker images for amd64 + arm64
  # ---------------------------------------------------------------------
  docker:
    name: docker (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            arch: amd64
            qemu_arch: amd64
          - os: ubuntu-latest
            arch: arm64
            qemu_arch: arm64
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.qemu_arch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Picroom
            org.opencontainers.image.description=Self-hosted image hosting service
            org.opencontainers.image.licenses=MIT

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------
  # Build release binaries for Linux (x86_64/aarch64), Windows (x86_64),
  # and macOS (x86_64/aarch64). The release profile already strips symbols
  # (Cargo.toml [profile.release] strip = "symbols"), so no manual strip.
  # ---------------------------------------------------------------------
  binary:
    name: binary (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_ext: tar.gz
            use_cross: false
          - name: linux-aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_ext: tar.gz
            use_cross: true
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_ext: zip
            use_cross: false
          - name: macos-x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            asset_ext: tar.gz
            use_cross: false
          - name: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            asset_ext: tar.gz
            use_cross: false
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin picroom

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }} --bin picroom

      - name: Package (tar.gz)
        if: matrix.asset_ext == 'tar.gz'
        shell: bash
        run: |
          DIR="picroom-${{ steps.version.outputs.version }}-${{ matrix.name }}"
          mkdir -p "$DIR"
          cp "target/${{ matrix.target }}/release/picroom" "$DIR/picroom"
          cp docker/config.example.toml "$DIR/config.example.toml"
          cp README.md LICENSE "$DIR/"
          tar czf "$DIR.tar.gz" "$DIR"

      - name: Package (zip)
        if: matrix.asset_ext == 'zip'
        shell: pwsh
        run: |
          $dir = "picroom-${{ steps.version.outputs.version }}-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/picroom.exe" "$dir/picroom.exe"
          Copy-Item docker/config.example.toml "$dir/config.example.toml"
          Copy-Item README.md, LICENSE "$dir/"
          Compress-Archive -Path "$dir/*" -DestinationPath "$dir.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picroom-${{ matrix.name }}
          path: picroom-${{ steps.version.outputs.version }}-${{ matrix.name }}.${{ matrix.asset_ext }}

      - name: Attach to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          files: picroom-${{ steps.version.outputs.version }}-${{ matrix.name }}.${{ matrix.asset_ext }}
          generate_release_notes: true
          draft: false
